<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css?family=Slabo+27px" rel="stylesheet">
  <link rel="stylesheet" href="css/font-awesome.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title>Pedagogia do Futebol</title>
</head>
<body>
  <header>
    <div class="topbar">
      <span class="fa-stack fa-lg">
        <i class="fa fa-circle fa-stack-2x fa-inverse"></i>
        <i class="fa fa-whatsapp fa-stack-1x"></i>
      </span>
      Whatsapp
      <span class="fa-stack fa-lg">
        <i class="fa fa-circle fa-stack-2x fa-inverse"></i>
        <i class="fa fa-facebook fa-stack-1x"></i>
      </span>
      Facebook
      <span class="fa-stack fa-lg">
        <i class="fa fa-circle fa-stack-2x fa-inverse"></i>
        <i class="fa fa-envelope fa-stack-1x"></i>
      </span>
      E-mail
    </div>
    <figure><img src="images/pedagogia_logo.jpg" width="300"></figure>
    <nav>
      <ul>
        <li><a href="#"><i class="fa fa-home" aria-hidden="true"></i>&nbsp;Home</a></li>
        <li><a href="#"><i class="fa fa-book" aria-hidden="true"></i>&nbsp;Cursos</a></li>
        <li><a href="#"><i class="fa fa-comments" aria-hidden="true"></i>&nbsp;Fale Conosco</a></li>
      </ul>
    </nav>
  </header>
  <div class="bg-slide">
    <div class="slideshow-container">

      <div class="mySlides fade">
        <img src="images/img1.jpg" style="width:100%">
        <div class="text">Curso A</div>
      </div>

      <div class="mySlides fade">
        <img src="images/img2.jpg" style="width:100%">
        <div class="text">Curso B</div>
      </div>

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
  </div>
  <footer>
    <p>Pedagogia do Futebol - &copy; Todos os direitos reservados.</p>
  </footer>
  <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
